.playlist-controls button {

<script>

const tracks = [

{
title: "treepura",
src: "https://pub-e85f3fbecc584393b0a9f4319f484c43.r2.dev/00apertor.mp3"
},

{
title: "golden",
src: "https://pub-e85f3fbecc584393b0a9f4319f484c43.r2.dev/goldenmaster.mp3"
},

{
title: "meeting",
src: "https://pub-e85f3fbecc584393b0a9f4319f484c43.r2.dev/meeting.mp3"
},

{
title: "roofie",
src: "https://pub-e85f3fbecc584393b0a9f4319f484c43.r2.dev/roofie.wav"
},

{
title: "canvas:",
src: "https://pub-e85f3fbecc584393b0a9f4319f484c43.r2.dev/Cnvas.mp3"
},

{
title: "bridges",
src: "https://pub-e85f3fbecc584393b0a9f4319f484c43.r2.dev/foryou.mp3"
}

];

let currentTrack = 0;

const player =
document.getElementById("player");

const trackName =
document.getElementById("trackName");

function loadTrack(index)
{
  currentTrack = index;

  player.src =
  tracks[index].src;

  trackName.textContent =
  tracks[index].title;
}

function nextTrack()
{
  loadTrack(
    (currentTrack + 1) %
    tracks.length
  );

  player.play();
}

function prevTrack()
{
  loadTrack(
    (currentTrack - 1 +
    tracks.length) %
    tracks.length
  );

  player.play();
}

player.addEventListener(
  "ended",
  nextTrack
);

loadTrack(0);

</script>
