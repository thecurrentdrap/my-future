<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CUT-LOVING CAT TALES</title>

  <!-- Weird but elegant font -->
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500;700&display=swap" rel="stylesheet">

  <style>

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #090909;
    color: #f1f1f1;
    font-family: 'Unbounded', sans-serif;

    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 40px;
  }

  .container {
    width: 100%;
    max-width: 700px;

    background: rgba(20,20,20,0.95);

    border: 1px solid rgba(255,255,255,0.06);

    border-radius: 24px;

    padding: 40px;

    box-shadow:
      0 0 40px rgba(0,0,0,0.7),
      0 0 120px rgba(255,255,255,0.03);

    backdrop-filter: blur(10px);
  }

  .cover-image {
    width: 100%;

    border-radius: 18px;

    margin-bottom: 30px;

    object-fit: cover;

    filter:
      brightness(0.85)
      contrast(1.1)
      grayscale(0.1);
  }

  h1 {
    font-size: 2.8rem;
    font-weight: 700;

    line-height: 1.1;

    margin-bottom: 10px;

    letter-spacing: -2px;
  }

  .subtitle {
    color: #7d7d7d;

    font-size: 0.9rem;

    margin-bottom: 40px;

    text-transform: uppercase;

    letter-spacing: 3px;
  }

  .track {
    background: #121212;

    border: 1px solid rgba(255,255,255,0.05);

    border-radius: 18px;

    padding: 25px;
  }

  .track-name {
    font-size: 1.1rem;

    margin-bottom: 20px;

    color: #d7d7d7;
  }

  audio {
    width: 100%;

    filter:
      contrast(1.1)
      brightness(0.95);
  }

  footer {
    margin-top: 40px;

    text-align: center;

    color: #555;

    font-size: 0.75rem;

    letter-spacing: 2px;
  }
    contact {
    margin-top: 40px;

    text-align: center;

    color: #555;

    font-size: 0.9rem;

    letter-spacing: 2px;
  }
    

  /* MOBILE VERSION */
  @media (max-width: 768px) {

    body {
      padding: 20px;

      align-items: flex-start;
    }

    .container {
      padding: 24px;

      border-radius: 18px;
    }

    .cover-image {
      width: 100%;

      max-height: 420px;

      object-fit: cover;

      border-radius: 20px;

      margin-bottom: 28px;
    }

    h1 {
      font-size: 2rem;

      text-align: center;

      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 0.7rem;

      text-align: center;

      letter-spacing: 2px;

      margin-bottom: 30px;
    }

    .track {
      padding: 22px;

      border-radius: 20px;
    }

    .track-name {
      font-size: 1rem;

      text-align: center;

      margin-bottom: 18px;
    }

    audio {
      width: 100%;

      height: 70px;

      border-radius: 16px;
    }

    footer {
      margin-top: 28px;

      font-size: 0.65rem;

      letter-spacing: 1px;
    }

  }

</style>
</head>
<body>

  <div class="container">

    <!-- IMAGE -->
    <!-- Upload cover.jpg to your R2 bucket -->
    <img
      class="cover-image"
      src="https://pub-e85f3fbecc584393b0a9f4319f484c43.r2.dev/OLIOLI.jpg"
      alt="Cover Art"
    >

    <h1>
      THE FUTURISTIC PAST
    </h1>

    <div class="subtitle">
      before my death:
    </div>

    <div class="track">

      <div class="track-name">
        mesrev
      </div>
    
      <audio controls controlsList="nodownload">
        <source
          src="https://pub-e85f3fbecc584393b0a9f4319f484c43.r2.dev/mesrev.mp3"
          type="audio/mpeg"
        >
        Your browser does not support audio playback.
      </audio>

    </div>
    
    
    <footer>
  © 2026 — THE FUTURISTIC PAST
  <br>
      Contact: <a href="mailto:someoneknownbynone@gmail.com">
    someoneknownbynone@gmail.com
    </a>
      <br>
  
  <br>
  
  <br>
  
  
</footer>

  </div>

</body>
</html>
